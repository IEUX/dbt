# models/staging/google_sheets/schema.yml
version: 2

models:
  - name: stg_google_sheets__account_manager_region_mapping
    description: "Mapping between a geographic state and its account manager, one row per state."
    columns:
      - name: state
        description: "Primary key. Geographic state; each state maps to one account manager."
        data_tests:
          - unique
          - not_null
      - name: account_manager
        description: "Account manager responsible for the state."
        data_tests:
          - not_null
