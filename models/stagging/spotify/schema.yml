# models/staging/spotify/schema.yml
version: 2

models:
  - name: stg_spotify__songs
    description: "Cleaned song catalogue, one row per song."
    columns:
      - name: song_id
        description: "Primary key. Native unique identifier of the song."
        data_tests:
          - unique
          - not_null
      - name: artist
        description: "Calculated: artist name upper-cased."
      - name: title
        description: "Calculated: song title upper-cased."
      - name: genre
        description: "Calculated: genre with NULL replaced by 'Unknown'."

  - name: stg_spotify__listening_data
    description: >
      Cleaned listening history, one row per listening record. No single natural
      primary key (a song can be listened to many times).
    columns:
      - name: song_id
        description: "Foreign key to stg_spotify__songs."
        data_tests:
          - not_null
          # NOTE: may surface orphan song_ids (the intermediate model uses an
          # inner join), which is exactly what the relationships test verifies.
          - relationships:
              name: relationships_listening_song_id__songs
              to: ref('stg_spotify__songs')
              field: song_id
      - name: listen_date
        description: "Calculated: listening date cast to DATE."
      - name: minutes_listened
        description: "Calculated: minutes listened with NULL replaced by 0."
